schema_version: "1.0"

extension:
  # Product/release identity stays EngLoopKit; this installed command extension owns
  # the ordered speckit.engloop picker namespace.
  id: "engloop"
  name: "EngLoopKit"
  version: "1.11.3"
  description: "Ordered evidence-gated delivery, operations, stewardship, and private overlay workflow for Spec Kit."
  author: "stuartpa"
  repository: "https://github.com/stuartpa/engloopkit"
  license: "MIT"
  homepage: "https://github.com/stuartpa/engloopkit"

requires:
  speckit_version: ">=0.12.0"

provides:
  commands:
    - name: "speckit.engloop.01-northstar"
      file: "commands/speckit.engloop.01-northstar.md"
      description: "Define or evolve the singleton root NORTHSTAR.md from evidence-backed direction."
    - name: "speckit.engloop.02-scaffold"
      file: "commands/speckit.engloop.02-scaffold.md"
      description: "Prove the selected test runway and record deterministic Stage 02 evidence."
    - name: "speckit.engloop.03-architect"
      file: "commands/speckit.engloop.03-architect.md"
      description: "Derive and govern architecture from current direction and scaffold evidence."
    - name: "speckit.engloop.04-refactor"
      file: "commands/speckit.engloop.04-refactor.md"
      description: "Execute governed implementation/refactor work under accepted architecture."
    - name: "speckit.engloop.05-model"
      file: "commands/speckit.engloop.05-model.md"
      description: "Author and validate the independent behavior model including rejection semantics."
    - name: "speckit.engloop.06-explore"
      file: "commands/speckit.engloop.06-explore.md"
      description: "Explore model scenarios, regenerate deterministic suites, and capture CORD evidence."
    - name: "speckit.engloop.07-validate"
      file: "commands/speckit.engloop.07-validate.md"
      description: "Execute generated-only functional validation and produce reachability evidence."
    - name: "speckit.engloop.08-unittest"
      file: "commands/speckit.engloop.08-unittest.md"
      description: "Classify unreached paths, enforce delete/revalidate ordering, then compute final readiness."
    - name: "speckit.engloop.09-debugger-walk-thru"
      file: "commands/speckit.engloop.09-debugger-walk-thru.md"
      description: "Recommend and track an engineer-led debugger walkthrough without blocking review preparation."
    - name: "speckit.engloop.10-codereview-prepare"
      file: "commands/speckit.engloop.10-codereview-prepare.md"
      description: "Minimize and validate the current PR after the current Stage 08 readiness PASS."
    - name: "speckit.engloop.20-incident"
      file: "commands/speckit.engloop.20-incident.md"
      description: "Stabilize real incidents and record mitigation-only operational evidence."
    - name: "speckit.engloop.21-postmortem"
      file: "commands/speckit.engloop.21-postmortem.md"
      description: "Analyze selected stabilized incidents into PM/LEARN/RPI outputs."
    - name: "speckit.engloop.22-repair"
      file: "commands/speckit.engloop.22-repair.md"
      description: "Route repair obligations through governed implementation and verification gates."
    - name: "speckit.engloop.30-refactor-scan"
      file: "commands/speckit.engloop.30-refactor-scan.md"
      description: "Select one REFACT decision or no-work outcome under explicit stewardship capacity."
    - name: "speckit.engloop.31-learnings-pyramid"
      file: "commands/speckit.engloop.31-learnings-pyramid.md"
      description: "Validate source/card/index/retrieval learnings completeness and provenance."
    - name: "speckit.engloop.40-pomodoro-create"
      file: "commands/speckit.engloop.40-pomodoro-create.md"
      description: "Capture concise evidence-backed notes about the just-completed work session."
    - name: "speckit.engloop.50-overlay-pack"
      file: "commands/speckit.engloop.50-overlay-pack.md"
      description: "Verify and pack a private ELK overlay into one portable local ZIP archive."
    - name: "speckit.engloop.51-overlay-remove"
      file: "commands/speckit.engloop.51-overlay-remove.md"
      description: "Remove an installed private ELK overlay and restore prior local hooks."
    - name: "speckit.engloop.60-powerpnt-create"
      file: "commands/speckit.engloop.60-powerpnt-create.md"
      description: "Create an evidence-backed Markdown-first PowerPoint deck with architecture and model graphs."

tags:
  - "loop-engineering"
  - "spec-driven"
  - "model-checking"
  - "operations"
  - "readiness"
